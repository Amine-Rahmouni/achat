version: '3.8'
services:
  app:
    build: .
    container_name: achat-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/achat
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: achat-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=achat
    ports:
      - "3306:3306"
